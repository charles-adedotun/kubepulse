apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

namePrefix: prod-

labels:
- includeSelectors: true
  pairs:
    environment: production

images:
- name: ghcr.io/charles-adedotun/kubepulse
  newTag: latest

replicas:
- name: kubepulse
  count: 5

patches:
- path: deployment-patch.yaml
- path: service-patch.yaml
