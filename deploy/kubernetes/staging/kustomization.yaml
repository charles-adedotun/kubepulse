apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

namePrefix: staging-

labels:
- includeSelectors: true
  pairs:
    environment: staging

images:
- name: ghcr.io/charles-adedotun/kubepulse
  newTag: staging

replicas:
- name: kubepulse
  count: 2

patches:
- path: deployment-patch.yaml
- path: service-patch.yaml
